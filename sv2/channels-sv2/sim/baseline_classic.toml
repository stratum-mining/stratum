algorithm = "classic"
trial_count = 1000
base_seed = 16045690984503111693
quiet_window_secs = 300
settle_buffer_secs = 120
min_settled_window_secs = 600
react_window_secs = 300
step_event_at_secs = 900
trial_duration_secs = 1800

