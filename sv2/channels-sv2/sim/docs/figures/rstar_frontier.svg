<text x="460.0" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Where to set r*: a frame, not a number — √-benefit vs linear cost, and the band that brackets the knee</text>
<text x="460.0" y="43" text-anchor="middle" font-size="11" fill="#888" font-style="italic">rstar-frontier.rs (generated, closed form). Benefit = floor width 1/√(r*·τ); cost = bandwidth ∝ r*. y-axis relative (shape, not magnitude). The knee is the pool's call, NOT the crossing.</text>
